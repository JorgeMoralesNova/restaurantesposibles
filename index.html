    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    restaurants.forEach(r => { r.distance = haversine(REF_LAT, REF_LNG, r.lat, r.lng); });

    // Centro del mapa en la zona de los restaurantes (no muestra ubicación exacta)
    const mapCenterLat = 4.82;
    const mapCenterLng = -74.06;
    const map = L.map('map', { center: [mapCenterLat, mapCenterLng], zoom: 11, zoomControl: true });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 20, subdomains: 'abcd'
    }).addTo(map);

    // No se muestra marcador de ubicación del usuario por privacidad

    const markers = {};
    let currentFilter = 'all';

    function createMarkerIcon(r) {
        const cls = r.mariachiSpecified ? '' : ' not-specified-pin';
        return L.divIcon({
            className: 'custom-marker',
            html: `<div class="marker-pin${cls}"><span>${r.id}</span></div>`,
            iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32]
        });
    }

    function getSocialLink(r) {
        if (r.socialType === 'instagram') return `https://www.instagram.com/${r.social.replace('@', '')}/`;
        if (r.socialType === 'facebook') return `https://www.facebook.com/${r.social.replace('@', '')}/`;
        if (r.socialType === 'web') return r.social.startsWith('http') ? r.social : `https://${r.social}`;
        return '#';
    }

    function getSocialIcon(type) {
        if (type === 'instagram') return 'fab fa-instagram';
        if (type === 'facebook') return 'fab fa-facebook-f';
        return 'fas fa-globe';
    }

    function createPopupContent(r) {
        const distKm = r.distance.toFixed(1);
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}`;
        const directionsUrl = `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lng}`;
        const socialLink = getSocialLink(r);
        const socialIcon = getSocialIcon(r.socialType);

        return `
            <div class="popup-container">
                <div class="popup-header">
                    <div class="popup-name">${r.name}</div>
                    <div class="popup-zone">${r.zone}</div>
                </div>
                <div class="popup-body">
                    <div class="popup-row"><i class="fas fa-map-marker-alt"></i><div><div class="label">DIRECCIÓN</div><div class="value">${r.address}</div></div></div>
                    <div class="popup-row"><i class="fas fa-phone"></i><div><div class="label">TELÉFONO</div><div class="value">${r.phone}</div></div></div>
                    <div class="popup-row"><i class="fas fa-route"></i><div><div class="label">DISTANCIA</div><div class="value">${distKm} km</div></div></div>
                    <div class="popup-row"><i class="fas fa-info-circle"></i><div><div class="label">NOTAS</div><div class="value">${r.notas}</div></div></div>
                    <div class="popup-badges">
                        ${r.mariachiSpecified
                            ? '<span class="popup-badge" style="background:rgba(46,125,50,0.2);color:#81c784;border:1px solid rgba(46,125,50,0.3);">🎸 Mariachi Confirmado</span>'
                            : '<span class="popup-badge" style="background:rgba(230,81,0,0.2);color:#ffb74d;border:1px solid rgba(230,81,0,0.3);">⚠️ Mariachi No Especificado</span>'}
                        ${r.campestre ? '<span class="popup-badge" style="background:rgba(139,69,19,0.3);color:#d4a574;border:1px solid rgba(139,69,19,0.4);">🌿 Campestre</span>' : ''}
                        ${r.familiar ? '<span class="popup-badge" style="background:rgba(33,150,243,0.2);color:#64b5f6;border:1px solid rgba(33,150,243,0.3);">👨‍👩‍👧‍👦 Familiar</span>' : ''}
                    </div>
                    <div class="popup-social">
                        <a href="${socialLink}" target="_blank" rel="noreferrer" title="Red social"><i class="${socialIcon}"></i></a>
                        <a href="${mapsUrl}" target="_blank" rel="noreferrer" title="Ver en Google Maps"><i class="fas fa-map"></i></a>
                        <a href="tel:${r.phone.replace(/\s|\/|-/g, '').split(',')[0]}" title="Llamar"><i class="fas fa-phone"></i></a>
                    </div>
                </div>
                <a href="${directionsUrl}" target="_blank" rel="noreferrer" class="popup-directions"><i class="fas fa-directions"></i> Cómo llegar</a>
            </div>`;
    }

    restaurants.forEach(r => {
        const marker = L.marker([r.lat, r.lng], { icon: createMarkerIcon(r) })
            .addTo(map)
            .bindPopup(createPopupContent(r), { maxWidth: 340, minWidth: 290 });
        markers[r.id] = marker;
    });

    function filterRestaurants(filter, searchTerm = '') {
        let filtered = [...restaurants];
        if (filter === 'mariachi-si') filtered = filtered.filter(r => r.mariachiSpecified);
        else if (filter === 'mariachi-no') filtered = filtered.filter(r => !r.mariachiSpecified);
        else if (filter === 'cerca') filtered = filtered.filter(r => r.distance <= 15);
        else if (filter === 'chia') filtered = filtered.filter(r =>
            r.zone.toLowerCase().includes('chía') || r.zone.toLowerCase().includes('chia') ||
            r.zone.toLowerCase().includes('cajicá') || r.zone.toLowerCase().includes('cota') ||
            r.zone.toLowerCase().includes('tenjo'));
        else if (filter === 'campestre') filtered = filtered.filter(r => r.campestre);
        else if (filter === 'bogota') filtered = filtered.filter(r =>
            r.zone.toLowerCase().includes('bogotá') || r.zone.toLowerCase().includes('bogota'));
        if (searchTerm) {
            const t = searchTerm.toLowerCase();
            filtered = filtered.filter(r =>
                r.name.toLowerCase().includes(t) || r.zone.toLowerCase().includes(t) || r.address.toLowerCase().includes(t));
        }
        return filtered;
    }

    function sortRestaurants(filtered) {
        const sortBy = document.getElementById('sortSelect').value;
        if (sortBy === 'distance') filtered.sort((a, b) => a.distance - b.distance);
        else if (sortBy === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));
        else if (sortBy === 'mariachi') filtered.sort((a, b) => (b.mariachiSpecified ? 1 : 0) - (a.mariachiSpecified ? 1 : 0) || a.distance - b.distance);
        return filtered;
    }

    function renderList() {
        const searchTerm = document.getElementById('searchBox').value;
        let filtered = filterRestaurants(currentFilter, searchTerm);
        filtered = sortRestaurants(filtered);

        document.getElementById('restaurantList').innerHTML = filtered.map(r => `
            <div class="restaurant-card" data-id="${r.id}" onclick="focusRestaurant(${r.id})">
                <div class="card-number ${r.mariachiSpecified ? 'specified' : 'not-specified'}">${r.id}</div>
                <div class="card-content">
                    <div class="card-name">${r.name}</div>
                    <div class="card-zone">${r.zone}</div>
                    <div class="card-address">${r.address}</div>
                    <div class="distance-indicator"><i class="fas fa-route"></i> ${r.distance.toFixed(1)} km</div>
                    <div class="card-badges">
                        ${r.mariachiSpecified
                            ? '<span class="badge badge-mariachi">🎸 Mariachi</span>'
                            : '<span class="badge badge-not-specified">⚠️ Mariachi No Especificado</span>'}
                        ${r.campestre ? '<span class="badge badge-campestre">🌿 Campestre</span>' : ''}
                        ${r.familiar ? '<span class="badge badge-familiar">👨‍👩‍👧‍👦 Familiar</span>' : ''}
                        ${r.distance <= 10 ? '<span class="badge badge-distancia">📍 Muy Cerca</span>' : ''}
                    </div>
                </div>
            </div>`).join('');

        document.getElementById('totalCount').textContent = filtered.length;
        document.getElementById('mariachiCount').textContent = filtered.filter(r => r.mariachiSpecified).length;
        document.getElementById('nearCount').textContent = filtered.filter(r => r.distance <= 15).length;

        const filteredIds = new Set(filtered.map(r => r.id));
        restaurants.forEach(r => {
            if (markers[r.id]) {
                if (filteredIds.has(r.id)) { if (!map.hasLayer(markers[r.id])) markers[r.id].addTo(map); }
                else { if (map.hasLayer(markers[r.id])) map.removeLayer(markers[r.id]); }
            }
        });
    }

    function focusRestaurant(id) {
        const r = restaurants.find(r => r.id === id);
        if (r && markers[id]) {
            map.setView([r.lat, r.lng], 15);
            markers[id].openPopup();
            document.querySelectorAll('.restaurant-card').forEach(c => c.classList.remove('highlighted'));
            const card = document.querySelector(`.restaurant-card[data-id="${id}"]`);
            if (card) { card.classList.add('highlighted'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
        }
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderList();
        });
    });
    document.getElementById('searchBox').addEventListener('input', renderList);
    document.getElementById('sortSelect').addEventListener('change', renderList);
    renderList();
</script>
