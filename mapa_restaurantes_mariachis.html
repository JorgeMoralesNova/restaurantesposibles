            color: #eee;

            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #C41E3A 0%, #8B0000 50%, #4A0000 100%);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 1000;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left .icon {
            font-size: 28px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 11px;
            opacity: 0.85;
            margin-top: 2px;
        }

        .header-stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-num {
            font-size: 22px;
            font-weight: 800;
        }

        .stat-label {
            font-size: 9px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 340px;
            background: #16213e;
            overflow-y: auto;
            border-right: 1px solid #2a2a4a;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            background: #0f3460;
            border-bottom: 1px solid #2a2a4a;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-box {
            width: 100%;
            padding: 10px 14px 10px 36px;
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box:focus {
            border-color: #C41E3A;
        }

        .search-icon {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 13px;
        }

        .filter-buttons {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 4px 10px;
            border: 1px solid #3a3a5a;
            border-radius: 20px;
            background: transparent;
            color: #aaa;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #C41E3A;
            border-color: #C41E3A;
            color: #fff;
        }

        .restaurant-list {
            padding: 0;
        }

        .restaurant-card {
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a3e;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            gap: 10px;
        }

        .restaurant-card:hover {
            background: #1f2b4d;
        }

        .restaurant-card.highlighted {
            background: #2a1a1a;
            border-left: 3px solid #C41E3A;
        }

        .card-number {
            background: #C41E3A;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .card-content {
            flex: 1;
            min-width: 0;
        }

        .card-name {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 3px;
        }

        .card-zone {
            font-size: 10px;
            color: #C41E3A;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .card-address {
            font-size: 11px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-badges {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 9px;
            padding: 2px 7px;
            border-radius: 10px;
            font-weight: 600;
        }

        .badge-mariachi {
            background: rgba(196, 30, 58, 0.2);
            color: #ff6b81;
            border: 1px solid rgba(196, 30, 58, 0.3);
        }

        .badge-externo {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .badge-distancia {
            background: rgba(52, 152, 219, 0.2);
            color: #5dade2;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        #map {
            flex: 1;
            z-index: 1;
        }

        .custom-marker {
            background: none;
            border: none;
        }

        .marker-pin {
            width: 32px;
            height: 32px;
            border-radius: 50% 50% 50% 0;
            background: #C41E3A;
            position: relative;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .marker-pin span {
            transform: rotate(45deg);
            color: white;
            font-size: 12px;
            font-weight: 700;
        }

        .marker-pin.user-pin {
            background: #2ecc71;
            width: 36px;
            height: 36px;
        }

        .marker-pin.user-pin span {
            font-size: 16px;
        }

            background: #16213e;
            color: #eee;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2a4a;
        }

        .leaflet-popup-tip {
            background: #16213e;
            border: 1px solid #2a2a4a;
        }

        .leaflet-popup-content {
            margin: 0;
            min-width: 280px;
        }

        .popup-container {
            padding: 0;
        }

        .popup-header {
            background: linear-gradient(135deg, #C41E3A, #8B0000);
            padding: 12px 16px;
            border-radius: 12px 12px 0 0;
        }

        .popup-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .popup-zone {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            margin-top: 2px;
        }

        .popup-body {
            padding: 12px 16px;
        }

            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }

        .popup-row i {
            color: #C41E3A;
            width: 16px;
            text-align: center;
            margin-top: 2px;
            font-size: 13px;
        }

        .popup-row .label {
            font-size: 10px;
            color: #888;
            margin-bottom: 1px;
        }

        .popup-row .value {
            font-size: 12px;
            color: #eee;
        }

        .popup-row a {
            color: #5dade2;
            text-decoration: none;
        }

        .popup-row a:hover {
            text-decoration: underline;
        }

        .popup-badges {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .popup-badge {

            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
        }

        .popup-social {

            gap: 8px;
            margin-top: 10px;
        }

            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #2a2a4a;
            color: #eee;
            text-decoration: none;

            background: #C41E3A;
        }

            display: block;
            margin-top: 12px;
            padding: 8px;
            background: #C41E3A;
            color: white;
            text-align: center;
            border-radius: 0 0 12px 12px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .popup-directions:hover {
            background: #a01830;
        }

            margin-right: 6px;
        }

            color: #fff !important;
            font-size: 20px !important;
            top: 6px !important;
            right: 8px !important;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: #16213e;
        }
        .sidebar::-webkit-scrollbar-thumb {

            border-radius: 3px;

            color: #5dade2;

            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #1a1a3e;

            color: #888;
        }

            padding: 4px 8px;
            border: 1px solid #3a3a5a;
            border-radius: 6px;
            background: #1a1a2e;
            color: #eee;
            font-size: 11px;
            outline: none;

        <div class="restaurant-list" id="restaurantList">

    </div>
    <div id="map"></div>
</div>

            social: "@labenditacantinamariachi", socialType: "instagram",
            mariachiVivo: true, mariachiExterno: true,
            mapsSearch: "La Bendita Cantina Mariachi Bogotá"
        },
        {
            id: 26, name: "Bar Cantineros", address: "Av Calle 72 #97-22",
            zone: "Bogotá (Engativá)", phone: "3008254249",
            lat: 4.6510, lng: -74.0605,
            social: "@cantinerosbar", socialType: "instagram",
            mariachiVivo: true, mariachiExterno: true,
            mapsSearch: "Bar Cantineros Bogotá"
        },
        {
            id: 27, name: "Jalisco Comida Mexicana & Parrilla", address: "Cra 11 #97-14, Chicó Norte",
            zone: "Bogotá (Chicó Norte)", phone: "3165816938",
            lat: 4.6685, lng: -74.0540,
            social: "@jaliscoyparrilla", socialType: "instagram",
            mariachiVivo: false, mariachiExterno: true,
            mapsSearch: "Jalisco Comida Mexicana Parrilla Bogotá"
        },
        {
            id: 28, name: "Plaza MX Modelia", address: "Calle 24D #75-20",
            zone: "Bogotá (Modelia)", phone: "6013909811",
            lat: 4.6610, lng: -74.1030,
            social: "@plazamxmodelia", socialType: "instagram",
            mariachiVivo: true, mariachiExterno: true,
            mapsSearch: "Plaza MX Modelia Bogotá"
        }
    ];

    // Calculate distances
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    restaurants.forEach(r => {
        r.distance = haversine(USER_LAT, USER_LNG, r.lat, r.lng);
    });

    // Initialize map
    const map = L.map('map', {
        center: [USER_LAT, USER_LNG],
        zoom: 11,
        zoomControl: true
    });

    // Using CartoDB tiles which work from file:// protocol (no Referer requirement)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 20,
        subdomains: 'abcd'
    }).addTo(map);

    // User marker
    const userIcon = L.divIcon({
        className: 'custom-marker',
        html: '<div class="marker-pin user-pin"><span>📍</span></div>',
        iconSize: [36, 36],
        iconAnchor: [18, 36],
        popupAnchor: [0, -36]
    });

    L.marker([USER_LAT, USER_LNG], { icon: userIcon })
        .addTo(map)
        .bindPopup(`
            <div class="popup-container">
                <div class="popup-header">
                    <div class="popup-name">Tu Ubicación</div>
                    <div class="popup-zone">4°57'17.8"N 74°04'43.1"W</div>
                </div>
                <div class="popup-body">
                    <div class="popup-row">
                        <i class="fas fa-home"></i>
                        <div>
                            <div class="label">ZONA</div>
                            <div class="value">La Caro / Norte de Bogotá</div>
                        </div>
                    </div>
                </div>
            </div>
        `);

    // Restaurant markers
    const markers = {};
    let currentFilter = 'all';

    function createMarkerIcon(id) {
        return L.divIcon({
            className: 'custom-marker',
            html: `<div class="marker-pin"><span>${id}</span></div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        });
    }

    function getSocialLink(r) {
        if (r.socialType === 'instagram') {
            return `https://www.instagram.com/${r.social.replace('@', '')}/`;
        } else if (r.socialType === 'facebook') {
            return `https://www.facebook.com/${r.social.replace('@', '')}/`;
        } else if (r.socialType === 'web') {
            return r.social.startsWith('http') ? r.social : `https://${r.social}`;
        }
        return '#';
    }

    function getSocialIcon(type) {
        switch(type) {
            case 'instagram': return 'fab fa-instagram';
            case 'facebook': return 'fab fa-facebook-f';
            case 'web': return 'fas fa-globe';
            default: return 'fas fa-link';
        }
    }

    function createPopupContent(r) {
        const distKm = r.distance.toFixed(1);
        const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}`;
        const directionsUrl = `https://www.google.com/maps/dir/?api=1&origin=${USER_LAT},${USER_LNG}&destination=${r.lat},${r.lng}`;
        const socialLink = getSocialLink(r);
        const socialIcon = getSocialIcon(r.socialType);

        return `
            <div class="popup-container">
                <div class="popup-header">
                    <div class="popup-name">${r.name}</div>
                    <div class="popup-zone">${r.zone}</div>
                </div>
                <div class="popup-body">
                    <div class="popup-row">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <div class="label">DIRECCIÓN</div>
                            <div class="value">${r.address}</div>
                        </div>
                    </div>
                    <div class="popup-row">
                        <i class="fas fa-phone"></i>
                        <div>
                            <div class="label">TELÉFONO</div>
                            <div class="value">${r.phone}</div>
                        </div>
                    </div>
                    <div class="popup-row">
                        <i class="fas fa-route"></i>
                        <div>
                            <div class="label">DISTANCIA DESDE TU UBICACIÓN</div>
                            <div class="value">${distKm} km</div>
                        </div>
                    </div>
                    <div class="popup-badges">
                        ${r.mariachiVivo ? '<span class="popup-badge" style="background:rgba(196,30,58,0.2);color:#ff6b81;border:1px solid rgba(196,30,58,0.3);">🎸 Mariachi en Vivo</span>' : ''}
                        ${r.mariachiExterno ? '<span class="popup-badge" style="background:rgba(46,204,113,0.2);color:#2ecc71;border:1px solid rgba(46,204,113,0.3);">✅ Permite Mariachis</span>' : ''}
                    </div>
                    <div class="popup-social">
                        <a href="${socialLink}" target="_blank" rel="noreferrer" title="Red social">
                            <i class="${socialIcon}"></i>
                        </a>
                        <a href="${mapsUrl}" target="_blank" rel="noreferrer" title="Ver en Google Maps">
                            <i class="fas fa-map"></i>
                        </a>
                        <a href="tel:${r.phone.replace(/\s|\/|-/g, '').split(',')[0]}" title="Llamar">
                            <i class="fas fa-phone"></i>
                        </a>
                    </div>
                </div>
                <a href="${directionsUrl}" target="_blank" class="popup-directions">
                    <i class="fas fa-directions"></i> Cómo llegar desde mi ubicación
                </a>
            </div>
        `;
    }

    restaurants.forEach(r => {
        const marker = L.marker([r.lat, r.lng], { icon: createMarkerIcon(r.id) })
            .addTo(map)
            .bindPopup(createPopupContent(r), { maxWidth: 320, minWidth: 280 });
        markers[r.id] = marker;
    });

    // Sidebar rendering
    function filterRestaurants(filter, searchTerm = '') {
        let filtered = [...restaurants];
        
        if (filter === 'mariachi-vivo') {
            filtered = filtered.filter(r => r.mariachiVivo);
        } else if (filter === 'cerca') {
            filtered = filtered.filter(r => r.distance <= 15);
        } else if (filter === 'chia') {
            filtered = filtered.filter(r => r.zone.toLowerCase().includes('chía') || r.zone.toLowerCase().includes('chia') || r.zone.toLowerCase().includes('cajicá') || r.zone.toLowerCase().includes('cota'));
        } else if (filter === 'bogota-norte') {
            filtered = filtered.filter(r => r.zone.toLowerCase().includes('bogotá') && (r.zone.includes('Norte') || r.zone.includes('Usaquén') || r.zone.includes('116') || r.zone.includes('Colina') || r.zone.includes('Chicó')));
        }

        if (searchTerm) {
            const term = searchTerm.toLowerCase();
            filtered = filtered.filter(r => 
                r.name.toLowerCase().includes(term) || 
                r.zone.toLowerCase().includes(term) || 
                r.address.toLowerCase().includes(term)
            );
        }

        return filtered;
    }

    function sortRestaurants(filtered) {
        const sortBy = document.getElementById('sortSelect').value;
        if (sortBy === 'distance') {
            filtered.sort((a, b) => a.distance - b.distance);
        } else if (sortBy === 'name') {
            filtered.sort((a, b) => a.name.localeCompare(b.name));
        } else if (sortBy === 'mariachi') {
            filtered.sort((a, b) => (b.mariachiVivo ? 1 : 0) - (a.mariachiVivo ? 1 : 0) || a.distance - b.distance);
        }
        return filtered;
    }

    function renderList() {
        const searchTerm = document.getElementById('searchBox').value;
        let filtered = filterRestaurants(currentFilter, searchTerm);
        filtered = sortRestaurants(filtered);

        const listEl = document.getElementById('restaurantList');
        listEl.innerHTML = filtered.map(r => `
            <div class="restaurant-card" data-id="${r.id}" onclick="focusRestaurant(${r.id})">
                <div class="card-number">${r.id}</div>
                <div class="card-content">
                    <div class="card-name">${r.name}</div>
                    <div class="card-zone">${r.zone}</div>
                    <div class="card-address">${r.address}</div>
                    <div class="distance-indicator"><i class="fas fa-route"></i> ${r.distance.toFixed(1)} km de tu ubicación</div>
                    <div class="card-badges">
                        ${r.mariachiVivo ? '<span class="badge badge-mariachi">🎸 Mariachi Vivo</span>' : ''}
                        ${r.mariachiExterno ? '<span class="badge badge-externo">✅ Mariachis OK</span>' : ''}
                        ${r.distance <= 10 ? '<span class="badge badge-distancia">📍 Muy Cerca</span>' : ''}
                    </div>
                </div>
            </div>
        `).join('');

        // Update stats
        document.getElementById('totalCount').textContent = filtered.length;
        document.getElementById('mariachiCount').textContent = filtered.filter(r => r.mariachiVivo).length;
        document.getElementById('nearCount').textContent = filtered.filter(r => r.distance <= 15).length;

        // Show/hide markers
        const filteredIds = new Set(filtered.map(r => r.id));
        restaurants.forEach(r => {
            if (markers[r.id]) {
                if (filteredIds.has(r.id)) {
                    if (!map.hasLayer(markers[r.id])) markers[r.id].addTo(map);
                } else {
                    if (map.hasLayer(markers[r.id])) map.removeLayer(markers[r.id]);
                }
            }
        });
    }

    function focusRestaurant(id) {
        const r = restaurants.find(r => r.id === id);
        if (r && markers[id]) {
            map.setView([r.lat, r.lng], 15);
            markers[id].openPopup();
            
            // Highlight card
            document.querySelectorAll('.restaurant-card').forEach(c => c.classList.remove('highlighted'));
            const card = document.querySelector(`.restaurant-card[data-id="${id}"]`);
            if (card) {
                card.classList.add('highlighted');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
    }

    // Event listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderList();
        });
    });

    document.getElementById('searchBox').addEventListener('input', renderList);
    document.getElementById('sortSelect').addEventListener('change', renderList);

    // Initial render
    renderList();
</script>
</body>
</html>
